spring.application.name=payroll

# ── MySQL datasource ──
spring.datasource.url=jdbc:mysql://localhost:3306/payroll_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=admin

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ── Springdoc / Swagger UI ──
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

# Spring Security default credentials are intentionally removed.
# The admin account is seeded by DataInitializer on first startup.
# Default login → username: admin | password: admin123

# ── Spring Mail (SMTP) ──
# To use Gmail, generate an App Password and place it here.
# For local testing, tools like Mailtrap or Mailhog (port 1025) are recommended.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── File Upload Configuration ──
file.upload-dir=uploads/documents
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
